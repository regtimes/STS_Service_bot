<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склад STS</title>
    <!-- Официальный скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <!-- Мощная библиотека для чтения ЛЮБЫХ штрихкодов и QR -->
    <script src="https://unpkg.com"></script>

    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color, #fff); color: var(--tg-theme-text-color, #000); text-align: center; padding: 20px; }
        button { background: var(--tg-theme-button-color, #2481cc); color: var(--tg-theme-button-text-color, #fff); border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; width: 100%; max-width: 300px; }
        /* Контейнер, где будет отображаться видео с камеры */
        #reader { width: 100%; max-width: 400px; margin: 20px auto; border-radius: 12px; overflow: hidden; }
    </style>
</head>
<body>
    <h2>📦 Складской терминал STS</h2>
    <p>Добро пожаловать в систему учета остатков!</p>

    <!-- Место для отображения камеры -->
    <div id="reader"></div>

    <button onclick="startScanning()">Включить сканер</button>

    <script>
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        let html5QrcodeScanner;

        function startScanning() {
            // Настраиваем сканер на поиск всех видов штрихкодов
            html5QrcodeScanner = new Html5QrcodeScanner("reader", {
                fps: 10,
                qrbox: { width: 250, height: 150 }, // Прямоугольная область под штрихкод
                formatsToSupport: [
                    Html5QrcodeSupportedFormats.EAN_13,
                    Html5QrcodeSupportedFormats.CODE_128,
                    Html5QrcodeSupportedFormats.QR_CODE
                ]
            });

            html5QrcodeScanner.render(onScanSuccess, onScanFailure);
        }

        function onScanSuccess(decodedText, decodedResult) {
            // Звуковой или виброотклик от Telegram при успешном сканировании
            if (tg.HapticFeedback) {
                tg.HapticFeedback.notificationOccurred('success');
            }

            alert("Штрихкод считан: " + decodedText);

            // Выключаем камеру после успешного чтения
            html5QrcodeScanner.clear();
        }

        function onScanFailure(error) {
            // Сюда попадают логи поиска линий (можно оставить пустым, чтобы не спамить)
            console.warn(`Ошибка сканирования: ${error}`);
        }
    </script>
</body>
</html>
