<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Склад STS</title>
    <!-- ПРАВИЛЬНОЕ ПОДКЛЮЧЕНИЕ SDK TELEGRAM -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; background: var(--tg-theme-bg-color); color: var(--tg-theme-text-color); text-align: center; padding: 20px; }
        button { background: var(--tg-theme-button-color); color: var(--tg-theme-button-text-color); border: none; padding: 12px 20px; border-radius: 8px; font-size: 16px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>
    <h2>📦 Складской терминал STS</h2>
    <p>Добро пожаловать в систему учета остатков!</p>

    <!-- Кнопка вызова встроенного сканера Telegram -->
    <button onclick="scanBarcode()">Сканировать штрихкод</button>

    <script>
        // 1. Инициализация объекта
        const tg = window.Telegram.WebApp;

        // 2. Сигнал Telegram, что приложение готово
        tg.ready();
        tg.expand();

        function scanBarcode() {
            try {
                // 3. Вызов встроенного сканера через официальный метод
                tg.showScanQrPopup({ text: "Наведите камеру на штрихкод товара" }, function(text) {
                    alert("Считан код: " + text);
                    tg.closeScanQrPopup();
                    return true;
                });
            } catch (error) {
                alert("Ошибка запуска сканера: " + error.message);
            }
        }
    </script>
</body>
</html>
